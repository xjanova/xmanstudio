name: Auto Deploy to Production

on:
  # Deploy after CI completes successfully on main
  # This ensures tests pass and version is bumped before deploying
  workflow_run:
    workflows: ["CI - Tests & Quality Checks"]
    types:
      - completed
    branches:
      - main

  # Manual trigger
  workflow_dispatch:
    inputs:
      skip_ci:
        description: 'Skip CI checks (fast deploy)'
        required: false
        default: 'false'
        type: boolean

# Prevent concurrent deployments
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # Quick check - ensure code at least compiles
  pre-check:
    name: Pre-deploy Check
    runs-on: ubuntu-latest
    # Only run if CI was successful, or if manually triggered
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - run: composer install --prefer-dist --no-interaction --no-dev --optimize-autoloader
      - name: Lint PHP files
        run: |
          find app/ routes/ config/ -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -v "No syntax errors" | head -20
          # Fail if any syntax errors found
          find app/ routes/ config/ -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -q "Parse error" && exit 1 || true

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-check]
    if: >
      always() &&
      (needs.pre-check.result == 'success' || github.event.inputs.skip_ci == 'true')

    steps:
      - name: Check SSH secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Required SSH secrets are not configured."
            echo "Please set: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY"
            echo "Optional: SSH_PORT (defaults to 22), DEPLOY_PATH (defaults to /home/admin/domains/xman4289.com)"
            exit 1
          fi
          echo "✓ SSH secrets configured"

      - name: Deploy via SSH (git pull + optimize)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 5m
          script: |
            set -e

            # Configuration
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/home/admin/domains/xman4289.com}"

            echo "🚀 Starting deployment to ${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            # Backup .env
            cp .env .env.backup.$(date +%Y%m%d_%H%M%S) 2>/dev/null || true

            # Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Install/update composer dependencies
            echo "📦 Installing composer dependencies..."
            composer update --no-dev --optimize-autoloader --no-interaction 2>&1 || {
              echo "⚠️ Composer update failed, trying with --no-scripts"
              composer update --no-dev --optimize-autoloader --no-interaction --no-scripts
            }

            # Run migrations (if any)
            echo "🗃️ Running migrations..."
            php artisan migrate --force 2>&1 || echo "⚠️ Migration warnings (non-fatal)"

            # Build front-end assets (Vite) so public_html/build/ has the
            # fresh CSS/JS hashes. Skipped if node is not on PATH.
            if command -v npm >/dev/null 2>&1; then
              echo "🎨 Building front-end assets..."
              npm ci --no-audit --no-fund 2>&1 | tail -20 || {
                echo "⚠️ npm ci failed, falling back to npm install"
                npm install --no-audit --no-fund 2>&1 | tail -20
              }
              npm run build 2>&1 | tail -20 || echo "⚠️ npm run build failed — production will keep old bundle"
            else
              echo "⚠️ npm not found on PATH — skipping asset build (manifest.json will be stale)"
            fi

            # Clear and rebuild caches (CRITICAL for new routes)
            echo "⚡ Optimizing application..."
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan cache:clear 2>/dev/null || true
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache 2>/dev/null || true

            # Fix permissions
            chmod -R 775 storage bootstrap/cache 2>/dev/null || true
            chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true

            # ===== ML Service (Puzzle Solver) =====
            # Non-fatal: ML service is optional, deploy continues even if it fails
            echo "🧠 Setting up ML service..."
            ML_DIR="${DEPLOY_PATH}/ml-services/puzzle-solver"
            bash -c '
              set +e
              cd "'"$ML_DIR"'" 2>/dev/null || exit 0

              # Create venv if not exists
              if [ ! -d "venv" ]; then
                python3 -m venv venv 2>/dev/null || python -m venv venv 2>/dev/null || { echo "⚠️ No Python venv"; exit 0; }
              fi

              # Install inference-only deps (no torch)
              if [ -d "venv" ]; then
                source venv/bin/activate
                pip install -q -r requirements-inference.txt 2>&1 | tail -3
                deactivate
              fi

              # Stop old ML service by PID file
              if [ -f ml-service.pid ]; then
                kill $(cat ml-service.pid) 2>/dev/null || true
                rm -f ml-service.pid
                sleep 1
              fi

              # Start ML service
              if [ -d "venv" ]; then
                source venv/bin/activate
                nohup gunicorn -w 2 -b 127.0.0.1:5050 --timeout 600 --pid ml-service.pid app:app > "'"${DEPLOY_PATH}"'/storage/logs/ml-service.log" 2>&1 &
                deactivate
                sleep 2
                curl -s http://127.0.0.1:5050/health && echo " ✅ ML service OK" || echo " ⚠️ ML service not ready"
              fi
            ' || echo "⚠️ ML setup skipped (non-fatal)"

            # Restart queue workers
            php artisan queue:restart 2>/dev/null || true
            sleep 3

            # Ensure queue worker is running (nohup will survive SSH disconnect)
            if ! ps aux | grep "[q]ueue:work" | grep -q .; then
              echo "🔄 Starting queue worker..."
              nohup php artisan queue:work database --sleep=3 --tries=3 --max-time=3600 --max-jobs=100 > storage/logs/queue-worker.log 2>&1 &
              sleep 2
              if ps aux | grep "[q]ueue:work" | grep -q .; then
                echo "✅ Queue worker started"
              else
                echo "⚠️ Queue worker failed to start"
              fi
            else
              echo "✅ Queue worker already running"
            fi

            # Restart PHP-FPM if available
            sudo systemctl restart php8.3-fpm 2>/dev/null || \
            sudo systemctl restart php8.2-fpm 2>/dev/null || \
            sudo systemctl restart php-fpm 2>/dev/null || \
            echo "⚠️ Could not restart PHP-FPM"

            echo "✅ Deployment completed successfully!"

      - name: Health Check
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          URL="${APP_URL:-https://xman4289.com}"
          echo "🔍 Checking health at: ${URL}/api/health"
          sleep 5
          HTTP_CODE=$(curl -s -o /tmp/health_response.json -w "%{http_code}" "${URL}/api/health" || echo "000")
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Application is healthy (HTTP $HTTP_CODE)"
            cat /tmp/health_response.json || true
          else
            echo "⚠️ Health check returned HTTP $HTTP_CODE (may still be starting up)"
            cat /tmp/health_response.json 2>/dev/null || true
          fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **Status:** Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
