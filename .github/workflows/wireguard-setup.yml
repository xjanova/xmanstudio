name: WireGuard VPN Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - setup-wireguard
          - wireguard-status
          - wireguard-restart
          - add-server
      server_name:
        description: 'Server name (for add-server)'
        required: false
        default: 'wg-server-1'
      country_code:
        description: 'Country code, e.g. SG (for add-server)'
        required: false
        default: 'SG'
      country_name:
        description: 'Country name, e.g. Singapore (for add-server)'
        required: false
        default: 'Singapore'
      port:
        description: 'WireGuard listen port (for add-server/setup-wireguard)'
        required: false
        default: '51820'
      interface:
        description: 'WireGuard interface name (for add-server/setup-wireguard)'
        required: false
        default: 'wg0'
      address:
        description: 'Server WireGuard address CIDR (for add-server)'
        required: false
        default: '10.20.0.1/24'
      max_clients:
        description: 'Maximum clients (for add-server)'
        required: false
        default: '250'
      net_interface:
        description: 'Network interface for NAT (for setup-wireguard/add-server)'
        required: false
        default: 'eth0'

jobs:
  wireguard:
    name: "WireGuard: ${{ inputs.action }}"
    runs-on: ubuntu-latest

    steps:
      - name: Execute via SSH
        uses: appleboy/ssh-action@v1
        env:
          WG_ACTION: ${{ inputs.action }}
          WG_SERVER_NAME: ${{ inputs.server_name }}
          WG_COUNTRY_CODE: ${{ inputs.country_code }}
          WG_COUNTRY_NAME: ${{ inputs.country_name }}
          WG_PORT: ${{ inputs.port }}
          WG_INTERFACE: ${{ inputs.interface }}
          WG_ADDRESS: ${{ inputs.address }}
          WG_MAX_CLIENTS: ${{ inputs.max_clients }}
          WG_NET_INTERFACE: ${{ inputs.net_interface }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 5m
          envs: WG_ACTION,WG_SERVER_NAME,WG_COUNTRY_CODE,WG_COUNTRY_NAME,WG_PORT,WG_INTERFACE,WG_ADDRESS,WG_MAX_CLIENTS,WG_NET_INTERFACE,DEPLOY_PATH
          script: |
            ACTION="${WG_ACTION}"
            echo "=============================="
            echo "Action: $ACTION"
            echo "Time: $(date)"
            echo "User: $(whoami)"
            echo "=============================="

            # Project directory (use DEPLOY_PATH secret, fallback to common paths)
            PROJECT_DIR="${DEPLOY_PATH:-/var/www/xmanstudio}"
            if [ ! -d "$PROJECT_DIR" ]; then
              # Try common DirectAdmin path
              for p in /home/*/domains/*/public_html /var/www/html; do
                if [ -f "$p/artisan" ]; then
                  PROJECT_DIR="$p"
                  break
                fi
              done
            fi
            echo "Project dir: $PROJECT_DIR"
            cd "$PROJECT_DIR" || { echo "ERROR: Project directory not found"; exit 1; }

            case "$ACTION" in
              setup-wireguard)
                echo "=== Installing WireGuard ==="
                sudo apt update && sudo apt install -y wireguard || echo "WARNING: Could not install WireGuard (sudo may require password)"

                echo "=== Enabling IP forwarding ==="
                sudo sysctl -w net.ipv4.ip_forward=1 || echo "WARNING: Could not enable IP forwarding"
                sudo sed -i 's/#net.ipv4.ip_forward=1/net.ipv4.ip_forward=1/' /etc/sysctl.conf 2>/dev/null || true
                grep -q '^net.ipv4.ip_forward=1' /etc/sysctl.conf 2>/dev/null || echo 'net.ipv4.ip_forward=1' | sudo tee -a /etc/sysctl.conf 2>/dev/null || true
                sudo sysctl -p 2>/dev/null || true

                echo "=== Running artisan wireguard:setup ==="
                php artisan wireguard:setup \
                  --name="${WG_SERVER_NAME}" \
                  --country="${WG_COUNTRY_CODE}" \
                  --country-name="${WG_COUNTRY_NAME}" \
                  --port="${WG_PORT}" \
                  --interface="${WG_INTERFACE}" \
                  --address="${WG_ADDRESS}" \
                  --max-clients="${WG_MAX_CLIENTS}" \
                  --net-interface="${WG_NET_INTERFACE}" \
                  --skip-install

                echo "=== Verifying ==="
                sudo wg show "${WG_INTERFACE}" 2>/dev/null || echo "WARNING: Interface not showing (WireGuard may need manual setup)"
                echo "=== DONE ==="
                ;;

              wireguard-status)
                echo "=== WireGuard Status ==="
                sudo wg show 2>/dev/null || echo "WireGuard not running or sudo unavailable"

                echo ""
                echo "=== systemctl status ==="
                sudo systemctl status wg-quick@wg0 --no-pager 2>/dev/null || true

                echo ""
                echo "=== Database servers ==="
                php artisan tinker --execute="
                  \$servers = \App\Models\WireguardServer::all();
                  foreach (\$servers as \$s) {
                    echo \"{$s->name} ({$s->country_code}) - {$s->endpoint} - Active: \" . (\$s->is_active ? 'Y' : 'N') . \" Healthy: \" . (\$s->is_healthy ? 'Y' : 'N') . \" Clients: \" . \$s->clients()->count() . \"/{$s->max_clients}\n\";
                  }
                " 2>/dev/null || true
                echo "=== DONE ==="
                ;;

              wireguard-restart)
                echo "=== Restarting WireGuard ==="
                IFACE="${WG_INTERFACE:-wg0}"
                sudo systemctl restart "wg-quick@${IFACE}"
                sleep 2
                sudo wg show "${IFACE}" || echo "WARNING: Interface not showing after restart"
                echo "=== DONE ==="
                ;;

              add-server)
                echo "=== Adding WireGuard server via artisan ==="
                php artisan wireguard:setup \
                  --name="${WG_SERVER_NAME}" \
                  --country="${WG_COUNTRY_CODE}" \
                  --country-name="${WG_COUNTRY_NAME}" \
                  --port="${WG_PORT}" \
                  --interface="${WG_INTERFACE}" \
                  --address="${WG_ADDRESS}" \
                  --max-clients="${WG_MAX_CLIENTS}" \
                  --net-interface="${WG_NET_INTERFACE}"
                echo "=== DONE ==="
                ;;

              *)
                echo "ERROR: Unknown action: $ACTION"
                exit 1
                ;;
            esac
