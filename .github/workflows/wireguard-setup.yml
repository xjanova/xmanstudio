name: WireGuard VPN Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - setup-wireguard
          - wireguard-status
          - wireguard-restart
          - add-server
      server_name:
        description: 'Server name (for add-server)'
        required: false
        default: 'wg-server-1'
      country_code:
        description: 'Country code, e.g. SG (for add-server)'
        required: false
        default: 'SG'
      country_name:
        description: 'Country name, e.g. Singapore (for add-server)'
        required: false
        default: 'Singapore'
      port:
        description: 'WireGuard listen port (for add-server/setup-wireguard)'
        required: false
        default: '51820'
      interface:
        description: 'WireGuard interface name (for add-server/setup-wireguard)'
        required: false
        default: 'wg0'
      address:
        description: 'Server WireGuard address CIDR (for add-server)'
        required: false
        default: '10.20.0.1/24'
      max_clients:
        description: 'Maximum clients (for add-server)'
        required: false
        default: '250'
      net_interface:
        description: 'Network interface for NAT (for setup-wireguard/add-server)'
        required: false
        default: 'eth0'

jobs:
  wireguard:
    name: "WireGuard: ${{ inputs.action }}"
    runs-on: ubuntu-latest

    steps:
      - name: Execute via SSH
        uses: appleboy/ssh-action@v1
        env:
          WG_ACTION: ${{ inputs.action }}
          WG_SERVER_NAME: ${{ inputs.server_name }}
          WG_COUNTRY_CODE: ${{ inputs.country_code }}
          WG_COUNTRY_NAME: ${{ inputs.country_name }}
          WG_PORT: ${{ inputs.port }}
          WG_INTERFACE: ${{ inputs.interface }}
          WG_ADDRESS: ${{ inputs.address }}
          WG_MAX_CLIENTS: ${{ inputs.max_clients }}
          WG_NET_INTERFACE: ${{ inputs.net_interface }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SUDO_PASS: ${{ secrets.SUDO_PASS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 5m
          envs: WG_ACTION,WG_SERVER_NAME,WG_COUNTRY_CODE,WG_COUNTRY_NAME,WG_PORT,WG_INTERFACE,WG_ADDRESS,WG_MAX_CLIENTS,WG_NET_INTERFACE,DEPLOY_PATH,SUDO_PASS
          script: |
            ACTION="${WG_ACTION}"
            echo "=============================="
            echo "Action: $ACTION"
            echo "Time: $(date)"
            echo "User: $(whoami)"
            echo "=============================="

            # Sudo wrapper: use SUDO_PASS if available
            do_sudo() {
              if [ -n "$SUDO_PASS" ]; then
                echo "$SUDO_PASS" | sudo -S "$@" 2>/dev/null
              else
                sudo "$@" 2>/dev/null
              fi
            }

            # Project directory (use DEPLOY_PATH secret, fallback to common paths)
            PROJECT_DIR="${DEPLOY_PATH:-/var/www/xmanstudio}"
            if [ ! -d "$PROJECT_DIR" ]; then
              for p in /home/*/domains/*/public_html /var/www/html; do
                if [ -f "$p/artisan" ]; then
                  PROJECT_DIR="$p"
                  break
                fi
              done
            fi
            echo "Project dir: $PROJECT_DIR"
            cd "$PROJECT_DIR" || { echo "ERROR: Project directory not found"; exit 1; }

            case "$ACTION" in
              setup-wireguard)
                echo "=== Installing WireGuard ==="
                do_sudo apt update && do_sudo apt install -y wireguard || echo "WARNING: Could not install WireGuard"

                echo "=== Enabling IP forwarding ==="
                do_sudo sysctl -w net.ipv4.ip_forward=1 || echo "WARNING: Could not enable IP forwarding"
                do_sudo sed -i 's/#net.ipv4.ip_forward=1/net.ipv4.ip_forward=1/' /etc/sysctl.conf || true
                grep -q '^net.ipv4.ip_forward=1' /etc/sysctl.conf 2>/dev/null || echo 'net.ipv4.ip_forward=1' | do_sudo tee -a /etc/sysctl.conf || true
                do_sudo sysctl -p || true

                echo "=== Running artisan wireguard:setup ==="
                php artisan wireguard:setup \
                  --name="${WG_SERVER_NAME}" \
                  --country="${WG_COUNTRY_CODE}" \
                  --country-name="${WG_COUNTRY_NAME}" \
                  --port="${WG_PORT}" \
                  --interface="${WG_INTERFACE}" \
                  --address="${WG_ADDRESS}" \
                  --max-clients="${WG_MAX_CLIENTS}" \
                  --net-interface="${WG_NET_INTERFACE}" \
                  --skip-install

                echo "=== Verifying ==="
                do_sudo wg show "${WG_INTERFACE}" || echo "WARNING: Interface not showing"
                echo "=== DONE ==="
                ;;

              wireguard-status)
                echo "=== System Info ==="
                echo "User: $(whoami)"
                echo "Groups: $(groups)"

                echo ""
                echo "=== WireGuard Installation ==="
                which wg 2>/dev/null && echo "wg binary: $(which wg)" || echo "wg binary: NOT FOUND"
                dpkg -l wireguard 2>/dev/null | grep -E "^ii" || echo "wireguard package: NOT INSTALLED"
                do_sudo ls -la /etc/wireguard/ || echo "/etc/wireguard/: NOT FOUND"

                echo ""
                echo "=== WireGuard Live Status ==="
                do_sudo wg show || echo "Cannot run wg show"

                echo ""
                echo "=== Network Interfaces ==="
                ip link show 2>/dev/null | grep -E "wg|tun" || echo "No WireGuard/tun interfaces found"
                ip addr show wg0 2>/dev/null || echo "wg0 interface: NOT FOUND"

                echo ""
                echo "=== IP Forwarding ==="
                cat /proc/sys/net/ipv4/ip_forward 2>/dev/null || echo "Cannot read"

                echo ""
                echo "=== Firewall (port 51820) ==="
                do_sudo iptables -L -n 2>/dev/null | grep -i "51820" || echo "No iptables rules for 51820"

                echo ""
                echo "=== systemctl status ==="
                do_sudo systemctl status wg-quick@wg0 --no-pager || true

                echo ""
                echo "=== Database servers ==="
                php artisan tinker --execute="
                  \$servers = \App\Models\WireguardServer::all();
                  if (\$servers->isEmpty()) { echo \"No servers in database\n\"; }
                  foreach (\$servers as \$s) {
                    echo \$s->name . ' (' . \$s->country_code . ') - ' . \$s->endpoint . ' - Active: ' . (\$s->is_active ? 'Y' : 'N') . ' Healthy: ' . (\$s->is_healthy ? 'Y' : 'N') . ' Clients: ' . \$s->clients()->count() . '/' . \$s->max_clients . \"\n\";
                  }
                " 2>/dev/null || true
                echo "=== DONE ==="
                ;;

              wireguard-restart)
                echo "=== Restarting WireGuard ==="
                IFACE="${WG_INTERFACE:-wg0}"
                do_sudo systemctl restart "wg-quick@${IFACE}"
                sleep 2
                do_sudo wg show "${IFACE}" || echo "WARNING: Interface not showing after restart"
                echo "=== DONE ==="
                ;;

              add-server)
                echo "=== Adding WireGuard server via artisan ==="
                php artisan wireguard:setup \
                  --name="${WG_SERVER_NAME}" \
                  --country="${WG_COUNTRY_CODE}" \
                  --country-name="${WG_COUNTRY_NAME}" \
                  --port="${WG_PORT}" \
                  --interface="${WG_INTERFACE}" \
                  --address="${WG_ADDRESS}" \
                  --max-clients="${WG_MAX_CLIENTS}" \
                  --net-interface="${WG_NET_INTERFACE}"
                echo "=== DONE ==="
                ;;

              *)
                echo "ERROR: Unknown action: $ACTION"
                exit 1
                ;;
            esac
