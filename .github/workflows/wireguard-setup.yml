name: WireGuard VPN Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - setup-wireguard
          - wireguard-status
          - wireguard-restart
          - add-server
      server_name:
        description: 'Server name (for add-server)'
        required: false
        default: 'wg-server-1'
      country_code:
        description: 'Country code, e.g. SG (for add-server)'
        required: false
        default: 'SG'
      country_name:
        description: 'Country name, e.g. Singapore (for add-server)'
        required: false
        default: 'Singapore'
      port:
        description: 'WireGuard listen port (for add-server/setup-wireguard)'
        required: false
        default: '51820'
      interface:
        description: 'WireGuard interface name (for add-server/setup-wireguard)'
        required: false
        default: 'wg0'
      address:
        description: 'Server WireGuard address CIDR (for add-server)'
        required: false
        default: '10.20.0.1/24'
      max_clients:
        description: 'Maximum clients (for add-server)'
        required: false
        default: '250'
      net_interface:
        description: 'Network interface for NAT (for setup-wireguard/add-server)'
        required: false
        default: 'eth0'

jobs:
  wireguard:
    name: "WireGuard: ${{ inputs.action }}"
    runs-on: ubuntu-latest

    steps:
      - name: Execute via SSH
        uses: appleboy/ssh-action@v1
        env:
          INPUT_ACTION: ${{ inputs.action }}
          INPUT_SERVER_NAME: ${{ inputs.server_name }}
          INPUT_COUNTRY_CODE: ${{ inputs.country_code }}
          INPUT_COUNTRY_NAME: ${{ inputs.country_name }}
          INPUT_PORT: ${{ inputs.port }}
          INPUT_INTERFACE: ${{ inputs.interface }}
          INPUT_ADDRESS: ${{ inputs.address }}
          INPUT_MAX_CLIENTS: ${{ inputs.max_clients }}
          INPUT_NET_INTERFACE: ${{ inputs.net_interface }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 5m
          envs: INPUT_ACTION,INPUT_SERVER_NAME,INPUT_COUNTRY_CODE,INPUT_COUNTRY_NAME,INPUT_PORT,INPUT_INTERFACE,INPUT_ADDRESS,INPUT_MAX_CLIENTS,INPUT_NET_INTERFACE
          script: |
            ACTION="${INPUT_ACTION}"
            echo "=============================="
            echo "Action: $ACTION"
            echo "Time: $(date)"
            echo "User: $(whoami)"
            echo "=============================="

            # Project directory
            PROJECT_DIR="/var/www/xmanstudio"
            cd "$PROJECT_DIR" || { echo "ERROR: Project directory not found"; exit 1; }

            case "$ACTION" in
              setup-wireguard)
                echo "=== Installing WireGuard ==="
                sudo apt update
                sudo apt install -y wireguard

                echo "=== Enabling IP forwarding ==="
                sudo sysctl -w net.ipv4.ip_forward=1
                sudo sed -i 's/#net.ipv4.ip_forward=1/net.ipv4.ip_forward=1/' /etc/sysctl.conf
                grep -q '^net.ipv4.ip_forward=1' /etc/sysctl.conf || echo 'net.ipv4.ip_forward=1' | sudo tee -a /etc/sysctl.conf
                sudo sysctl -p

                echo "=== Running artisan wireguard:setup ==="
                php artisan wireguard:setup \
                  --name="${INPUT_SERVER_NAME}" \
                  --country="${INPUT_COUNTRY_CODE}" \
                  --country-name="${INPUT_COUNTRY_NAME}" \
                  --port="${INPUT_PORT}" \
                  --interface="${INPUT_INTERFACE}" \
                  --address="${INPUT_ADDRESS}" \
                  --max-clients="${INPUT_MAX_CLIENTS}" \
                  --net-interface="${INPUT_NET_INTERFACE}" \
                  --skip-install

                echo "=== Verifying ==="
                sudo wg show "${INPUT_INTERFACE}" || echo "WARNING: Interface not showing"
                echo "=== DONE ==="
                ;;

              wireguard-status)
                echo "=== WireGuard Status ==="
                sudo wg show || echo "WireGuard not running"

                echo ""
                echo "=== systemctl status ==="
                sudo systemctl status wg-quick@wg0 --no-pager || true

                echo ""
                echo "=== Database servers ==="
                php artisan tinker --execute="
                  \$servers = \App\Models\WireguardServer::all();
                  foreach (\$servers as \$s) {
                    echo \"{$s->name} ({$s->country_code}) - {$s->endpoint} - Active: \" . (\$s->is_active ? 'Y' : 'N') . \" Healthy: \" . (\$s->is_healthy ? 'Y' : 'N') . \" Clients: \" . \$s->clients()->count() . \"/{$s->max_clients}\n\";
                  }
                " 2>/dev/null || true
                echo "=== DONE ==="
                ;;

              wireguard-restart)
                echo "=== Restarting WireGuard ==="
                IFACE="${INPUT_INTERFACE:-wg0}"
                sudo systemctl restart "wg-quick@${IFACE}"
                sleep 2
                sudo wg show "${IFACE}" || echo "WARNING: Interface not showing after restart"
                echo "=== DONE ==="
                ;;

              add-server)
                echo "=== Adding WireGuard server via artisan ==="
                php artisan wireguard:setup \
                  --name="${INPUT_SERVER_NAME}" \
                  --country="${INPUT_COUNTRY_CODE}" \
                  --country-name="${INPUT_COUNTRY_NAME}" \
                  --port="${INPUT_PORT}" \
                  --interface="${INPUT_INTERFACE}" \
                  --address="${INPUT_ADDRESS}" \
                  --max-clients="${INPUT_MAX_CLIENTS}" \
                  --net-interface="${INPUT_NET_INTERFACE}"
                echo "=== DONE ==="
                ;;

              *)
                echo "ERROR: Unknown action: $ACTION"
                exit 1
                ;;
            esac
