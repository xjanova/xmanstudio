name: Queue Monitor (Manual Only)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'queue-status'
        type: choice
        options:
          - queue-status
          - queue-restart
          - queue-ensure
          - full-check

# NOTE: Laravel Scheduler ให้ตั้ง cron บน DirectAdmin แทน (ไม่ต้องใช้ GitHub Actions)
# Cron Command: cd /path/to/xmanstudio && php artisan schedule:run >> /dev/null 2>&1
# Schedule: Every 5 minutes (*/5 * * * *)

jobs:
  queue-monitor:
    name: Queue Monitor
    runs-on: ubuntu-latest
    steps:
      - name: Run Queue Action via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 5m
          script: |
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/var/www/xmanstudio}"
            ACTION="${{ github.event.inputs.action }}"

            if [ ! -f "$DEPLOY_PATH/artisan" ]; then
              echo "ERROR: artisan not found at $DEPLOY_PATH"
              exit 1
            fi

            cd "$DEPLOY_PATH"

            # =============================================
            # Queue Worker: Ensure Running
            # =============================================
            ensure_queue_worker() {
              QUEUE_PID=$(ps aux | grep "[q]ueue:work" | awk '{print $2}' | head -1)
              if [ -z "$QUEUE_PID" ]; then
                echo "[$(date)] Queue worker NOT running — starting..."
                nohup php artisan queue:work database --sleep=3 --tries=3 --max-time=3600 --max-jobs=100 > storage/logs/queue-worker.log 2>&1 &
                sleep 2
                NEW_PID=$(ps aux | grep "[q]ueue:work" | awk '{print $2}' | head -1)
                if [ -n "$NEW_PID" ]; then
                  echo "[$(date)] Queue worker started (PID: $NEW_PID)"
                else
                  echo "[$(date)] WARNING: Queue worker failed to start"
                fi
              else
                echo "[$(date)] Queue worker running (PID: $QUEUE_PID)"
              fi
            }

            # =============================================
            # Queue Status
            # =============================================
            if [ "$ACTION" = "queue-status" ] || [ "$ACTION" = "full-check" ]; then
              ensure_queue_worker

              echo ""
              echo "=== Queue Status ==="
              echo "--- Pending Jobs ---"
              php artisan tinker --execute="echo \App\Models\MetalXVideoProject::whereIn('status', ['draft', 'music_ready', 'rendering', 'uploading'])->count() . ' video projects in progress';"
              php artisan tinker --execute="echo DB::table('jobs')->count() . ' jobs in queue';"
              php artisan tinker --execute="echo DB::table('failed_jobs')->count() . ' failed jobs';"

              echo ""
              echo "--- Automation Schedules ---"
              php artisan tinker --execute="
                \$schedules = \App\Models\MetalXAutomationSchedule::where('is_enabled', true)->get();
                foreach (\$schedules as \$s) {
                  echo \$s->action_type . ': next_run=' . \$s->next_run_at . ', runs=' . \$s->run_count . PHP_EOL;
                }
                echo \$schedules->count() . ' active schedules';
              "

              echo ""
              echo "--- Content Plans ---"
              php artisan tinker --execute="
                \$plans = \App\Models\MetalXContentPlan::where('is_enabled', true)->get();
                foreach (\$plans as \$p) {
                  echo \$p->name . ': next_gen=' . \$p->next_generation_at . ', total=' . \$p->total_generated . PHP_EOL;
                }
                echo \$plans->count() . ' active content plans';
              "
            fi

            # =============================================
            # Queue Ensure (just start if not running)
            # =============================================
            if [ "$ACTION" = "queue-ensure" ]; then
              ensure_queue_worker
            fi

            # =============================================
            # Queue Restart
            # =============================================
            if [ "$ACTION" = "queue-restart" ] || [ "$ACTION" = "full-check" ]; then
              echo ""
              echo "[$(date)] Restarting queue worker..."
              php artisan queue:restart 2>/dev/null || true
              sleep 3
              pkill -f "queue:work" 2>/dev/null || true
              sleep 2
              nohup php artisan queue:work database --sleep=3 --tries=3 --max-time=3600 --max-jobs=100 > storage/logs/queue-worker.log 2>&1 &
              sleep 2
              ps aux | grep "[q]ueue:work" || echo "WARNING: Queue worker not running after restart"
              echo "[$(date)] Queue restart complete"
            fi

            echo ""
            echo "[$(date)] Done"
