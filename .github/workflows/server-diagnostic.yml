name: Server Diagnostic & Fix

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - fix-proc-open
          - check-ffmpeg
          - install-ffmpeg
          - start-queue
          - full-setup
          - trigger-render
          - trigger-upload
          - setup-auto-production
          - import-content
          - create-video-project
      project_id:
        description: 'Project ID (for trigger-render/trigger-upload actions)'
        required: false
        default: '0'
        type: string
      import_urls:
        description: 'URLs to import (one per line, format: type|source|title|tags|url)'
        required: false
        type: string

jobs:
  diagnostic:
    name: Server Diagnostic
    runs-on: ubuntu-latest
    steps:
      - name: Run Server Diagnostic
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 10m
          script: |
            echo "========================================="
            echo "  SERVER DIAGNOSTIC - $(date)"
            echo "========================================="

            # PHP Version
            echo ""
            echo "--- PHP CLI Version ---"
            php -v | head -1

            echo ""
            echo "--- PHP-FPM Version ---"
            php-fpm8.3 -v 2>/dev/null || php-fpm8.2 -v 2>/dev/null || echo "Could not detect PHP-FPM version"

            # Check disabled functions (CLI)
            echo ""
            echo "--- PHP CLI disabled_functions ---"
            php -r "echo ini_get('disable_functions');" | tr ',' '\n' | sort
            echo ""

            # Check disabled functions (FPM - via web)
            echo ""
            echo "--- PHP-FPM disabled_functions (from php.ini) ---"
            PHP_INI_FPM=$(php-fpm8.3 -i 2>/dev/null | grep "disable_functions" | head -1 || echo "N/A")
            echo "$PHP_INI_FPM"

            # Find all php.ini files
            echo ""
            echo "--- PHP INI file locations ---"
            php --ini 2>/dev/null
            echo ""
            find /etc/php* -name "php.ini" -o -name "*.conf" 2>/dev/null | grep -E "php\.ini|fpm" | head -20

            # Check proc_open specifically
            echo ""
            echo "--- proc_open availability ---"
            php -r "echo function_exists('proc_open') ? 'CLI: proc_open AVAILABLE' : 'CLI: proc_open DISABLED';" && echo ""

            # Check FFmpeg
            echo ""
            echo "--- FFmpeg ---"
            which ffmpeg 2>/dev/null && ffmpeg -version 2>/dev/null | head -1 || echo "FFmpeg NOT FOUND"
            which ffprobe 2>/dev/null && ffprobe -version 2>/dev/null | head -1 || echo "ffprobe NOT FOUND"

            # Check queue worker
            echo ""
            echo "--- Queue Worker Status ---"
            ps aux | grep "queue:work" | grep -v grep || echo "No queue worker running"

            # Check if proc_open is in FPM disable list
            echo ""
            echo "--- Checking FPM php.ini for proc_open ---"
            FPM_INI=$(find /etc/php* -path "*/fpm/php.ini" 2>/dev/null | head -1)
            if [ -n "$FPM_INI" ]; then
              echo "FPM php.ini: $FPM_INI"
              grep "disable_functions" "$FPM_INI" | head -3
            else
              echo "Could not find FPM php.ini"
              # Try alternate locations
              find /usr/local/etc/php* /etc/php* /opt/alt/php*/etc/php.d/ -name "*.ini" 2>/dev/null | xargs grep -l "proc_open" 2>/dev/null | head -5
            fi

            # Metal-X Library Status
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/var/www/xmanstudio}"
            if [ -f "$DEPLOY_PATH/artisan" ]; then
              echo ""
              echo "--- Metal-X Library Status ---"
              cd "$DEPLOY_PATH"
              php artisan tinker --execute="
                echo '=== Media Library ===' . PHP_EOL;
                \$media = \App\Models\MetalXMediaLibrary::all();
                echo 'Total: ' . \$media->count() . ' (Active: ' . \$media->where('is_active', true)->count() . ')' . PHP_EOL;
                echo 'Images: ' . \$media->where('type', 'image')->count() . PHP_EOL;
                echo 'Video clips: ' . \$media->where('type', 'video_clip')->count() . PHP_EOL;
                foreach (\$media as \$m) {
                  echo '  [' . \$m->id . '] ' . \$m->type . ' | ' . \$m->source . ' | ' . \$m->file_path . ' | ' . (\$m->is_active ? 'active' : 'inactive') . PHP_EOL;
                }
                echo PHP_EOL . '=== Music Library ===' . PHP_EOL;
                \$music = \App\Models\MetalXMusicLibrary::all();
                echo 'Total: ' . \$music->count() . ' (Active: ' . \$music->where('is_active', true)->count() . ')' . PHP_EOL;
                foreach (\$music as \$t) {
                  echo '  [' . \$t->id . '] ' . \$t->title . ' | ' . \$t->style . ' | ' . \$t->duration_seconds . 's | ' . \$t->file_path . PHP_EOL;
                }
                echo PHP_EOL . '=== Latest Projects ===' . PHP_EOL;
                \$projects = \App\Models\MetalXVideoProject::orderBy('id', 'desc')->limit(5)->get();
                foreach (\$projects as \$p) {
                  echo '  [' . \$p->id . '] ' . \$p->status . ' | mode:' . (\$p->media_mode ?? 'n/a') . ' | imgs:' . count(\$p->images ?? []) . ' clips:' . count(\$p->video_clips ?? []) . ' | ' . \Illuminate\Support\Str::limit(\$p->title, 60) . PHP_EOL;
                }
              " 2>&1 || echo "Could not query Metal-X data"
            fi

            # Action: fix-proc-open
            if [ "${{ github.event.inputs.action }}" = "fix-proc-open" ]; then
              echo ""
              echo "========================================="
              echo "  FIXING proc_open"
              echo "========================================="

              # Find the FPM php.ini
              FPM_INI=$(find /etc/php* -path "*/fpm/php.ini" 2>/dev/null | head -1)
              CLI_INI=$(find /etc/php* -path "*/cli/php.ini" 2>/dev/null | head -1)

              for INI_FILE in "$FPM_INI" "$CLI_INI"; do
                if [ -n "$INI_FILE" ] && [ -f "$INI_FILE" ]; then
                  echo "Processing: $INI_FILE"
                  # Backup
                  sudo cp "$INI_FILE" "${INI_FILE}.bak.$(date +%Y%m%d)" 2>/dev/null || true
                  # Remove proc_open from disable_functions
                  sudo sed -i 's/proc_open,//g; s/,proc_open//g; s/proc_open//g' "$INI_FILE" 2>/dev/null || true
                  # Also remove proc_close and proc_get_status
                  sudo sed -i 's/proc_close,//g; s/,proc_close//g; s/proc_close//g' "$INI_FILE" 2>/dev/null || true
                  sudo sed -i 's/proc_get_status,//g; s/,proc_get_status//g; s/proc_get_status//g' "$INI_FILE" 2>/dev/null || true
                  echo "Cleaned disable_functions in $INI_FILE"
                  grep "disable_functions" "$INI_FILE" | head -1
                fi
              done

              # Also check for CloudLinux/DirectAdmin custom configs
              find /opt/alt/php*/etc/php.d/ /etc/php*/*/conf.d/ -name "*.ini" 2>/dev/null | xargs grep -l "proc_open" 2>/dev/null | while read f; do
                echo "Found proc_open in: $f"
                sudo sed -i 's/proc_open,//g; s/,proc_open//g; s/proc_open//g' "$f" 2>/dev/null || true
                sudo sed -i 's/proc_close,//g; s/,proc_close//g; s/proc_close//g' "$f" 2>/dev/null || true
                echo "Cleaned: $f"
              done

              # Restart PHP-FPM
              echo ""
              echo "Restarting PHP-FPM..."
              sudo systemctl restart php8.3-fpm 2>/dev/null || \
              sudo systemctl restart php8.2-fpm 2>/dev/null || \
              sudo systemctl restart php-fpm 2>/dev/null || \
              echo "Could not restart PHP-FPM"

              echo ""
              echo "--- Verify fix ---"
              php -r "echo function_exists('proc_open') ? 'CLI: proc_open AVAILABLE' : 'CLI: proc_open STILL DISABLED';" && echo ""
            fi

            # Action: install-ffmpeg (static binary, no sudo needed)
            if [ "${{ github.event.inputs.action }}" = "install-ffmpeg" ] || [ "${{ github.event.inputs.action }}" = "full-setup" ]; then
              echo ""
              echo "========================================="
              echo "  INSTALLING FFMPEG (static binary)"
              echo "========================================="

              # Use DEPLOY_PATH from secrets or default
              DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
              DEPLOY_PATH="${DEPLOY_PATH:-/var/www/xmanstudio}"
              BIN_DIR="$DEPLOY_PATH/bin"
              mkdir -p "$BIN_DIR"

              if [ -x "$BIN_DIR/ffmpeg" ]; then
                echo "FFmpeg already installed at $BIN_DIR/ffmpeg:"
                "$BIN_DIR/ffmpeg" -version | head -1
              else
                echo "Downloading static FFmpeg build..."
                cd /tmp
                curl -L -o ffmpeg-release.tar.xz "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" 2>&1 | tail -1
                echo "Extracting..."
                tar xf ffmpeg-release.tar.xz
                FFMPEG_DIR=$(ls -d ffmpeg-*-amd64-static 2>/dev/null | head -1)
                if [ -n "$FFMPEG_DIR" ]; then
                  cp "$FFMPEG_DIR/ffmpeg" "$BIN_DIR/ffmpeg"
                  cp "$FFMPEG_DIR/ffprobe" "$BIN_DIR/ffprobe"
                  chmod +x "$BIN_DIR/ffmpeg" "$BIN_DIR/ffprobe"
                  rm -rf "$FFMPEG_DIR" ffmpeg-release.tar.xz
                  echo ""
                  echo "--- Verify FFmpeg ---"
                  "$BIN_DIR/ffmpeg" -version | head -1
                  "$BIN_DIR/ffprobe" -version | head -1
                  echo "FFmpeg installed at: $BIN_DIR/ffmpeg"
                  echo "FFprobe installed at: $BIN_DIR/ffprobe"

                  # Update Laravel settings to use custom binary paths
                  cd "$DEPLOY_PATH"
                  php artisan tinker --execute="\\App\\Models\\Setting::setValue('ffmpeg_binary', '$BIN_DIR/ffmpeg'); \\App\\Models\\Setting::setValue('ffprobe_binary', '$BIN_DIR/ffprobe'); echo 'Settings updated';" 2>/dev/null || echo "Could not update settings via tinker"
                else
                  echo "ERROR: Could not extract FFmpeg archive"
                  ls -la /tmp/ffmpeg* 2>/dev/null
                fi
              fi
            fi

            # Action: start-queue
            if [ "${{ github.event.inputs.action }}" = "start-queue" ] || [ "${{ github.event.inputs.action }}" = "full-setup" ]; then
              echo ""
              echo "========================================="
              echo "  SETTING UP QUEUE WORKER"
              echo "========================================="

              DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
              DEPLOY_PATH="${DEPLOY_PATH:-/var/www/xmanstudio}"

              if [ -f "$DEPLOY_PATH/artisan" ]; then
                echo "Laravel directory: $DEPLOY_PATH"
                cd "$DEPLOY_PATH"

                # Check if queue worker is already running
                if ps aux | grep "queue:work" | grep -v grep > /dev/null; then
                  echo "Queue worker already running:"
                  ps aux | grep "queue:work" | grep -v grep
                else
                  echo "Starting queue worker with nohup..."
                  nohup php artisan queue:work --sleep=3 --tries=3 --max-time=3600 > storage/logs/queue-worker.log 2>&1 &
                  echo "Queue worker started (PID: $!)"
                  sleep 2
                  ps aux | grep "queue:work" | grep -v grep || echo "WARNING: Queue worker may not have started"
                fi

                echo ""
                echo "Queue worker running via nohup (will stop on server restart)"
              else
                echo "ERROR: artisan not found at $DEPLOY_PATH"
                echo "Searching for artisan..."
                find /home /var/www -name "artisan" -maxdepth 5 2>/dev/null | head -5
              fi
            fi

            # Action: trigger-render (dispatch RenderVideoJob for a project)
            if [ "${{ github.event.inputs.action }}" = "trigger-render" ]; then
              echo ""
              echo "========================================="
              echo "  TRIGGERING RENDER"
              echo "========================================="

              DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
              DEPLOY_PATH="${DEPLOY_PATH:-/var/www/xmanstudio}"
              cd "$DEPLOY_PATH"

              PROJECT_ID="${{ github.event.inputs.project_id }}"
              if [ "$PROJECT_ID" = "0" ] || [ -z "$PROJECT_ID" ]; then
                PROJECT_ID="0"
              fi

              # Fix suno_mode to onsite so future projects use library music
              echo "--- Fixing suno_mode to onsite ---"
              php artisan tinker --execute="
                \\App\\Models\\Setting::setValue('suno_mode', 'onsite');
                echo 'suno_mode set to: ' . \\App\\Models\\Setting::getValue('suno_mode') . PHP_EOL;
              "

              # Find project to render
              echo ""
              echo "--- Finding project to render ---"
              php artisan tinker --execute="
                \$pid = $PROJECT_ID;
                if (\$pid > 0) {
                  \$p = \\App\\Models\\MetalXVideoProject::find(\$pid);
                } else {
                  \$p = \\App\\Models\\MetalXVideoProject::whereIn('status', ['generating_music', 'music_ready', 'failed', 'draft'])
                    ->orderBy('id', 'desc')->first();
                }
                if (!\$p) { echo 'No project found'; exit; }
                echo 'Project #' . \$p->id . ': ' . \$p->title . PHP_EOL;
                echo 'Status: ' . \$p->status . PHP_EOL;
                echo 'Media mode: ' . (\$p->media_mode ?? 'none') . PHP_EOL;
                echo 'Images: ' . count(\$p->images ?? []) . PHP_EOL;
                echo 'Video clips: ' . count(\$p->video_clips ?? []) . PHP_EOL;

                // Check template_settings for audio
                \$ts = \$p->template_settings ?? [];
                echo 'Audio file: ' . (\$ts['audio_file'] ?? 'none') . PHP_EOL;

                // If no audio assigned, copy from library to project dir
                if (empty(\$ts['audio_file'])) {
                  \$music = \\App\\Models\\MetalXMusicLibrary::active()->first();
                  if (\$music) {
                    \$audioDir = 'metal-x/projects/' . \$p->id;
                    \$audioPath = \$audioDir . '/audio_' . \\Illuminate\\Support\\Str::random(8) . '.mp3';
                    \\Illuminate\\Support\\Facades\\Storage::disk('local')->makeDirectory(\$audioDir);
                    \\Illuminate\\Support\\Facades\\Storage::disk('local')->copy(\$music->file_path, \$audioPath);
                    \$ts['audio_file'] = \$audioPath;
                    \$p->update(['template_settings' => \$ts]);
                    \$music->incrementUsage();
                    echo 'Assigned music: ' . \$music->title . ' -> ' . \$audioPath . PHP_EOL;
                  } else {
                    echo 'ERROR: No music in library!' . PHP_EOL;
                    exit;
                  }
                }

                // If no media, assign video clips from library
                if (empty(\$p->images) && empty(\$p->video_clips)) {
                  \$media = \\App\\Models\\MetalXMediaLibrary::active()->get();
                  \$clips = \$media->where('type', 'video_clip')->pluck('file_path')->values()->toArray();
                  \$imgs = \$media->where('type', 'image')->pluck('file_path')->values()->toArray();
                  if (!empty(\$clips)) {
                    \$p->update(['video_clips' => \$clips, 'media_mode' => 'video_clips']);
                    echo 'Assigned ' . count(\$clips) . ' video clips' . PHP_EOL;
                  } elseif (!empty(\$imgs)) {
                    \$p->update(['images' => \$imgs, 'media_mode' => 'images']);
                    echo 'Assigned ' . count(\$imgs) . ' images' . PHP_EOL;
                  } else {
                    echo 'ERROR: No media in library!' . PHP_EOL;
                    exit;
                  }
                }

                // Reset status to music_ready if needed
                if (in_array(\$p->status, ['generating_music', 'failed', 'draft'])) {
                  \$p->update(['status' => 'music_ready', 'error_message' => null]);
                  echo 'Reset status to music_ready' . PHP_EOL;
                }

                if (\$p->fresh()->status === 'music_ready') {
                  echo 'FFmpeg: ' . \\App\\Models\\Setting::getValue('ffmpeg_binary', 'ffmpeg') . PHP_EOL;
                  \\App\\Jobs\\RenderVideoJob::dispatch(\$p->fresh());
                  echo 'RenderVideoJob dispatched!' . PHP_EOL;
                } else {
                  echo 'Cannot render: status is ' . \$p->status . PHP_EOL;
                }
              "

              # Ensure queue worker is running
              if ! ps aux | grep "queue:work" | grep -v grep > /dev/null; then
                echo "Starting queue worker..."
                nohup php artisan queue:work database --sleep=3 --tries=3 --max-time=3600 > storage/logs/queue-worker.log 2>&1 &
                sleep 2
              fi

              echo ""
              echo "Waiting 90s for render to complete..."
              sleep 90

              # Check status after dispatch
              php artisan tinker --execute="
                \$pid = $PROJECT_ID;
                if (\$pid > 0) {
                  \$p = \\App\\Models\\MetalXVideoProject::find(\$pid);
                } else {
                  \$p = \\App\\Models\\MetalXVideoProject::orderBy('id', 'desc')->first();
                }
                echo 'Status: ' . \$p->status . PHP_EOL;
                echo 'Error: ' . (\$p->error_message ?? 'none') . PHP_EOL;
                echo 'Video file: ' . (\$p->video_file_path ?? 'none') . PHP_EOL;
                echo 'Jobs in queue: ' . DB::table('jobs')->count() . PHP_EOL;
                echo 'Failed jobs: ' . DB::table('failed_jobs')->count() . PHP_EOL;
              "
            fi

            # Action: trigger-upload (dispatch UploadVideoJob)
            if [ "${{ github.event.inputs.action }}" = "trigger-upload" ]; then
              echo ""
              echo "========================================="
              echo "  TRIGGERING UPLOAD"
              echo "========================================="

              DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
              DEPLOY_PATH="${DEPLOY_PATH:-/var/www/xmanstudio}"
              cd "$DEPLOY_PATH"

              PROJECT_ID="${{ github.event.inputs.project_id }}"
              if [ "$PROJECT_ID" = "0" ] || [ -z "$PROJECT_ID" ]; then
                PROJECT_ID="0"
              fi

              php artisan tinker --execute="
                \$pid = $PROJECT_ID;
                if (\$pid > 0) {
                  \$p = \\App\\Models\\MetalXVideoProject::find(\$pid);
                } else {
                  \$p = \\App\\Models\\MetalXVideoProject::where('status', 'rendered')->orderBy('id', 'desc')->first();
                }
                if (!\$p) { echo 'No rendered project found'; exit; }
                echo 'Project #' . \$p->id . ': ' . \$p->title . PHP_EOL;
                echo 'Status: ' . \$p->status . PHP_EOL;
                echo 'Video file: ' . (\$p->video_file_path ?? 'none') . PHP_EOL;
                echo 'Channel: ' . (\$p->channel ? \$p->channel->name : 'none') . PHP_EOL;

                if (\$p->status === 'rendered') {
                  \\App\\Jobs\\UploadVideoJob::dispatch(\$p);
                  echo 'UploadVideoJob dispatched!' . PHP_EOL;
                } else {
                  echo 'Cannot upload: status is ' . \$p->status . PHP_EOL;
                }
              "

              # Ensure queue worker is running
              if ! ps aux | grep "queue:work" | grep -v grep > /dev/null; then
                echo "Starting queue worker..."
                nohup php artisan queue:work database --sleep=3 --tries=3 --max-time=3600 > storage/logs/queue-worker.log 2>&1 &
                sleep 2
              fi

              echo ""
              echo "Waiting 60s for upload..."
              sleep 60

              # Check status
              php artisan tinker --execute="
                \$pid = $PROJECT_ID;
                if (\$pid > 0) {
                  \$p = \\App\\Models\\MetalXVideoProject::find(\$pid);
                } else {
                  \$p = \\App\\Models\\MetalXVideoProject::orderBy('id', 'desc')->first();
                }
                echo 'Status: ' . \$p->status . PHP_EOL;
                echo 'Error: ' . (\$p->error_message ?? 'none') . PHP_EOL;
                if (\$p->video) {
                  echo 'YouTube ID: ' . (\$p->video->youtube_id ?? 'none') . PHP_EOL;
                }
              "
            fi

            # Action: setup-auto-production
            if [ "${{ github.event.inputs.action }}" = "setup-auto-production" ]; then
              echo ""
              echo "========================================="
              echo "  SETUP AUTO PRODUCTION"
              echo "========================================="

              DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
              DEPLOY_PATH="${DEPLOY_PATH:-/var/www/xmanstudio}"
              cd "$DEPLOY_PATH"

              # Ensure queue worker is running
              if ! ps aux | grep "[q]ueue:work" | grep -q .; then
                echo "Starting queue worker..."
                nohup php artisan queue:work database --sleep=3 --tries=3 --max-time=3600 --max-jobs=100 > storage/logs/queue-worker.log 2>&1 &
                sleep 2
              fi

              echo "Running metalx:setup-auto-production --generate-now..."
              php artisan metalx:setup-auto-production --generate-now 2>&1

              echo ""
              echo "--- Post-setup status ---"
              php artisan tinker --execute="
                echo 'Media: ' . \App\Models\MetalXMediaLibrary::active()->count() . PHP_EOL;
                echo 'Music: ' . \App\Models\MetalXMusicLibrary::active()->count() . PHP_EOL;
                echo 'Plans: ' . \App\Models\MetalXContentPlan::where('is_enabled', true)->count() . PHP_EOL;
                \$p = \App\Models\MetalXVideoProject::orderBy('id', 'desc')->first();
                if (\$p) { echo 'Latest project: ' . \$p->title . ' (status: ' . \$p->status . ')' . PHP_EOL; }
                echo 'Jobs in queue: ' . DB::table('jobs')->count() . PHP_EOL;
              "
            fi

            # Action: import-content (download from URLs into Metal-X)
            if [ "${{ github.event.inputs.action }}" = "import-content" ]; then
              echo ""
              echo "========================================="
              echo "  IMPORTING CONTENT FROM URLs"
              echo "========================================="

              DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
              DEPLOY_PATH="${DEPLOY_PATH:-/var/www/xmanstudio}"
              cd "$DEPLOY_PATH"

              # Parse import_urls input (format: type|source|title|tags|url)
              IMPORT_DATA="${{ github.event.inputs.import_urls }}"
              if [ -n "$IMPORT_DATA" ]; then
                echo "$IMPORT_DATA" | while IFS='|' read -r ITYPE ISOURCE ITITLE ITAGS IURL; do
                  if [ -z "$IURL" ]; then continue; fi
                  echo ""
                  echo "--- Importing: $ITITLE ($ITYPE from $ISOURCE) ---"
                  CMD="php artisan metalx:import-url \"$IURL\" --type=$ITYPE --source=$ISOURCE"
                  [ -n "$ITITLE" ] && CMD="$CMD --title=\"$ITITLE\""
                  [ -n "$ITAGS" ] && CMD="$CMD --tags=\"$ITAGS\""
                  [ "$ITYPE" = "music" ] && CMD="$CMD --style=metal"
                  eval $CMD 2>&1
                done
              else
                echo "No URLs provided. Use import_urls input."
                echo "Format: type|source|title|tags|url (one per line)"
                echo "Example: music|suno|Cyberpunk Apocalypse|metal,cyberpunk|https://cdn1.suno.ai/xxx.mp3"
              fi

              echo ""
              echo "--- Import Summary ---"
              php artisan tinker --execute="
                echo 'Media: ' . \App\Models\MetalXMediaLibrary::active()->count() . PHP_EOL;
                echo 'Music: ' . \App\Models\MetalXMusicLibrary::active()->count() . PHP_EOL;
              "
            fi

            # Action: create-video-project (create project with video clips, render + upload)
            if [ "${{ github.event.inputs.action }}" = "create-video-project" ]; then
              echo ""
              echo "========================================="
              echo "  CREATING VIDEO PROJECT WITH CLIPS"
              echo "========================================="

              DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
              DEPLOY_PATH="${DEPLOY_PATH:-/var/www/xmanstudio}"
              cd "$DEPLOY_PATH"

              php artisan tinker --execute="
                // Get video clips from library
                \$clips = \App\Models\MetalXMediaLibrary::active()->videoClips()->pluck('file_path')->values()->toArray();
                if (empty(\$clips)) { echo 'ERROR: No video clips in library!'; exit; }
                echo 'Found ' . count(\$clips) . ' video clips' . PHP_EOL;

                // Get music (least used)
                \$music = \App\Models\MetalXMusicLibrary::active()->orderBy('usage_count')->first();
                if (!\$music) { echo 'ERROR: No music in library!'; exit; }
                echo 'Music: ' . \$music->title . PHP_EOL;

                // Get channel
                \$channel = \App\Models\MetalXChannel::where('is_default', true)->first()
                  ?? \App\Models\MetalXChannel::first();
                if (!\$channel) { echo 'ERROR: No channel found!'; exit; }
                echo 'Channel: ' . \$channel->name . PHP_EOL;

                // Create project
                \$project = \App\Models\MetalXVideoProject::create([
                  'channel_id' => \$channel->id,
                  'title' => 'Cyberpunk Metal Apocalypse - AI Generated Video Clips [Metal-X]',
                  'description' => 'Epic cyberpunk metal music visualizer featuring AI-generated video clips from Freepik Kling 2.5. Dark cityscapes, neon lights, and metal warriors.',
                  'tags' => ['metal', 'cyberpunk', 'ai-generated', 'metal-x', 'music-visualizer', 'freepik', 'kling'],
                  'privacy_status' => 'public',
                  'template' => 'visualizer',
                  'template_settings' => ['transition' => 'crossfade', 'transition_duration' => 1, 'effect' => 'none'],
                  'video_clips' => \$clips,
                  'media_mode' => 'video_clips',
                  'status' => 'music_ready',
                  'auto_generated' => true,
                ]);

                // Copy music to project dir
                \$audioDir = 'metal-x/projects/' . \$project->id;
                \$audioPath = \$audioDir . '/audio_' . \Illuminate\Support\Str::random(8) . '.mp3';
                \Illuminate\Support\Facades\Storage::disk('local')->makeDirectory(\$audioDir);
                \Illuminate\Support\Facades\Storage::disk('local')->copy(\$music->file_path, \$audioPath);
                \$ts = \$project->template_settings ?? [];
                \$ts['audio_file'] = \$audioPath;
                \$project->update(['template_settings' => \$ts]);
                \$music->incrementUsage();

                echo 'Project #' . \$project->id . ' created with ' . count(\$clips) . ' video clips' . PHP_EOL;
                echo 'Audio: ' . \$audioPath . PHP_EOL;

                // Dispatch render (with auto-upload)
                \App\Jobs\RenderVideoJob::dispatch(\$project, true);
                echo 'RenderVideoJob dispatched (auto-upload enabled)!' . PHP_EOL;
              "

              # Ensure queue worker is running
              if ! ps aux | grep "queue:work" | grep -v grep > /dev/null; then
                echo "Starting queue worker..."
                nohup php artisan queue:work database --sleep=3 --tries=3 --max-time=3600 > storage/logs/queue-worker.log 2>&1 &
                sleep 2
              fi

              echo ""
              echo "Waiting 120s for render + upload..."
              sleep 120

              # Check status
              php artisan tinker --execute="
                \$p = \App\Models\MetalXVideoProject::orderBy('id', 'desc')->first();
                echo 'Project #' . \$p->id . ': ' . \$p->title . PHP_EOL;
                echo 'Status: ' . \$p->status . PHP_EOL;
                echo 'Error: ' . (\$p->error_message ?? 'none') . PHP_EOL;
                echo 'Video file: ' . (\$p->video_file_path ?? 'none') . PHP_EOL;
                if (\$p->video) {
                  echo 'YouTube ID: ' . (\$p->video->youtube_id ?? 'none') . PHP_EOL;
                }
                echo 'Jobs in queue: ' . DB::table('jobs')->count() . PHP_EOL;
                echo 'Failed jobs: ' . DB::table('failed_jobs')->count() . PHP_EOL;
              "
            fi

            echo ""
            echo "========================================="
            echo "  DIAGNOSTIC COMPLETE"
            echo "========================================="
